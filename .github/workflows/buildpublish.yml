name: .NET Build and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout kódu
      uses: actions/checkout@v6

    - name: Nastavení .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x' 

    - name: Obnova závislostí (Restore)
      run: dotnet restore

    - name: Build řešení (SLN)
      run: dotnet build --no-restore --configuration Release

    - name: Publish aplikace
      # --output určuje, kam se soubory vygenerují před nahráním do artifactů
      run: dotnet publish --configuration Release --no-build --output ./publish_output

    - name: Nahrání do Artifactů
      uses: actions/upload-artifact@v7
      with:
        name: IoTDeployer # Název balíčku, který uvidíš v GitHubu
        path: ./publish_output # Cesta ke složce, kterou jsme definovali v kroku 'Publish'
        if-no-files-found: error
